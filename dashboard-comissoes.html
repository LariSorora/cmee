<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Comissões – CMEE 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --azul:#003C7E;--azul-med:#00509E;--azul-light:#D6E4F5;--azul-pale:#EDF4FB;
  --roxo:#6B2D8B;--roxo-light:#EBD9F5;--roxo-pale:#F7F0FC;
  --branco:#FFF;--bg:#F5F6FA;--borda:rgba(0,60,126,0.12);
  --text:#1A1F36;--text-med:#5A6282;--text-light:#9CA3BF;
  --verde:#1A6B40;--amarelo:#C8960C;--vermelho:#C0392B;
}
body{font-family:'Open Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:var(--azul);box-shadow:0 2px 12px rgba(0,0,0,0.2)}
.h-inner{max-width:1140px;margin:0 auto;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:64px;gap:1rem}
.logo{display:flex;align-items:center;gap:12px}
.logo-ic{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;font-family:'Montserrat',sans-serif;font-weight:800;font-size:8px;color:white;text-align:center;line-height:1.2;padding:4px;flex-shrink:0}
.logo-txt b{font-family:'Montserrat',sans-serif;font-size:14px;font-weight:700;color:white;display:block}
.logo-txt small{font-size:11px;color:rgba(255,255,255,0.7)}
.h-right{display:flex;gap:10px;align-items:center}
.badge{background:var(--roxo);color:white;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px}
.btn-att{background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.25);border-radius:8px;color:white;font-size:12px;font-weight:600;padding:6px 12px;cursor:pointer;font-family:'Open Sans',sans-serif}
.btn-att:hover{background:rgba(255,255,255,0.25)}
.faixa{background:var(--roxo);text-align:center;padding:5px;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,0.9)}
main{max-width:1140px;margin:0 auto;padding:2rem 1.5rem 5rem}
.atualizado{font-size:12px;color:var(--text-light);text-align:right;margin-bottom:1.25rem}
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1rem;margin-bottom:1.5rem}
.stat{background:var(--branco);border-radius:12px;border:1px solid var(--borda);padding:1.1rem 1.25rem;display:flex;align-items:center;gap:12px}
.stat-ic{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.stat-n{font-family:'Montserrat',sans-serif;font-size:26px;font-weight:800;color:var(--azul);line-height:1}
.stat-l{font-size:12px;color:var(--text-med);margin-top:2px}
.charts{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.25rem;margin-bottom:1.5rem}
.card{background:var(--branco);border-radius:12px;border:1px solid var(--borda);padding:1.4rem}
.card.full{grid-column:1/-1}
.card-title{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;color:var(--azul);margin-bottom:1.1rem;display:flex;align-items:center;gap:8px}
.card-title i{width:4px;height:14px;background:var(--roxo);border-radius:2px;display:inline-block}
.ch{position:relative;height:210px}
.filtros{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem}
.ftab{padding:5px 14px;border-radius:20px;border:1.5px solid var(--borda);background:transparent;font-family:'Open Sans',sans-serif;font-size:12px;font-weight:600;color:var(--text-med);cursor:pointer;transition:.15s}
.ftab:hover{border-color:var(--roxo);color:var(--roxo)}
.ftab.on{background:var(--roxo);color:white;border-color:var(--roxo)}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:var(--azul-pale);border-bottom:2px solid var(--azul-light)}
th{padding:10px 12px;text-align:left;font-family:'Montserrat',sans-serif;font-weight:700;font-size:11px;color:var(--azul);letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--borda)}
tbody tr:hover{background:var(--azul-pale)}
td{padding:10px 12px;vertical-align:middle}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.t-mkt{background:#EDF4FB;color:#003C7E}
.t-evt{background:#F7F0FC;color:#6B2D8B}
.t-con{background:#E8F8F1;color:#1A6B40}
.t-mul{background:#FDF3DC;color:#7A5A06}
.wpp{display:inline-flex;align-items:center;gap:4px;background:#E8F8F1;color:#1A6B40;border:1px solid #C3ECD9;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:600;text-decoration:none;transition:.15s;white-space:nowrap}
.wpp:hover{background:#25D366;color:white;border-color:#25D366}
.loading{text-align:center;padding:5rem 2rem;color:var(--text-med)}
.spin{width:32px;height:32px;border:3px solid var(--borda);border-top-color:var(--roxo);border-radius:50%;animation:giro .8s linear infinite;margin:0 auto 1rem}
@keyframes giro{to{transform:rotate(360deg)}}
@media(max-width:640px){
  .stats{grid-template-columns:1fr 1fr}
  .charts{grid-template-columns:1fr}
  main{padding:1rem 1rem 3rem}
}
</style>
</head>
<body>

<div class="header">
  <div class="h-inner">
    <div class="logo">
      <div class="logo-ic">CMEE<br>ACIRP</div>
      <div class="logo-txt">
        <b>Dashboard · Comissões 2026</b>
        <small>Conselho da Mulher Empresária e Empreendedora</small>
      </div>
    </div>
    <div class="h-right">
      <span class="badge">CMEE 2026</span>
      <button class="btn-att" onclick="init()">↻ Atualizar</button>
    </div>
  </div>
  <div class="faixa">Acirp · São José do Rio Preto</div>
</div>

<main>
  <div id="loading" class="loading">
    <div class="spin"></div>
    <p>Carregando dados...</p>
  </div>
  <div id="app" style="display:none">
    <div class="atualizado" id="atualizado"></div>
    <div class="stats" id="stats"></div>
    <div class="charts" id="charts"></div>
    <div class="card full" id="tabela-card">
      <div class="card-title"><i></i>Lista de inscritas</div>
      <div class="filtros" id="filtros"></div>
      <div class="table-wrap"><table><thead><tr>
        <th>#</th><th>Nome</th><th>Empresa</th><th>Comissão</th>
        <th>Disponibilidade</th><th>Perfil</th><th>Busca</th><th>Contato</th>
      </tr></thead><tbody id="tbody"></tbody></table></div>
    </div>
  </div>
</main>

<script>
const URL_SCRIPT = 'https://script.google.com/macros/s/AKfycbx3658R0g4ESzqTF67mk0_QftzVE5faYi3Q-r1ZDBVCAxtU-o5eanJEU9FvW1fd6qAoKg/exec';
let todos = [], charts = {}, filtroAtivo = 'todas';

function init() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('app').style.display = 'none';

  fetch(URL_SCRIPT)
    .then(r => r.json())
    .then(data => {
      todos = data;
      montar();
      document.getElementById('atualizado').textContent = 'Última atualização: ' + new Date().toLocaleString('pt-BR');
      document.getElementById('loading').style.display = 'none';
      document.getElementById('app').style.display = 'block';
    })
    .catch(err => {
      document.getElementById('loading').innerHTML = '<p style="color:#C0392B">Erro ao carregar. Tente novamente.</p>';
      console.error(err);
    });
}

function montar() {
  // Stats
  const s = document.getElementById('stats');
  const mkt  = todos.filter(d => d.comissao === 'Marketing e Comunicação').length;
  const evt  = todos.filter(d => d.comissao === 'Eventos').length;
  const con  = todos.filter(d => d.comissao === 'Conexão e Associativismo').length;
  const mult = todos.filter(d => d.comissao === 'Tenho interesse em mais de uma').length;
  s.innerHTML = [
    ['👩‍💼','#EDF4FB', todos.length, 'Total de inscritas'],
    ['📢','#EDF4FB', mkt, 'Marketing'],
    ['🎯','#F7F0FC', evt, 'Eventos'],
    ['🤝','#E8F8F1', con, 'Conexão'],
    ['✨','#FDF3DC', mult, 'Mais de uma'],
  ].map(([ic,bg,n,l]) => `
    <div class="stat">
      <div class="stat-ic" style="background:${bg}">${ic}</div>
      <div><div class="stat-n">${n}</div><div class="stat-l">${l}</div></div>
    </div>`).join('');

  // Gráficos
  const cores = ['#003C7E','#6B2D8B','#1A6B40','#C8960C','#C0392B','#00509E'];
  const ch = document.getElementById('charts');
  ch.innerHTML = `
    <div class="card"><div class="card-title"><i></i>Por comissão</div><div class="ch"><canvas id="gc"></canvas></div></div>
    <div class="card"><div class="card-title"><i></i>Disponibilidade mensal</div><div class="ch"><canvas id="gt"></canvas></div></div>
    <div class="card"><div class="card-title"><i></i>Perfil de atuação</div><div class="ch"><canvas id="gp"></canvas></div></div>
    <div class="card"><div class="card-title"><i></i>O que buscam</div><div class="ch"><canvas id="gb"></canvas></div></div>`;

  const gc = contar(todos,'comissao');
  mkChart('gc','doughnut',Object.keys(gc),Object.values(gc),cores);

  const ordemT = ['Até 1h','2h a 4h','5h a 8h','Mais de 8h'];
  const gt2 = contar(todos,'tempo');
  mkChart('gt','bar',ordemT,ordemT.map(k=>gt2[k]||0),cores);

  const gp2 = contar(todos,'perfil');
  mkChart('gp','bar',Object.keys(gp2),Object.values(gp2),cores,true);

  const gb2 = contar(todos,'busca');
  mkChart('gb','bar',Object.keys(gb2),Object.values(gb2),cores,true);

  // Filtros
  const f = document.getElementById('filtros');
  f.innerHTML = '';
  [['todas','Todas'],['Marketing e Comunicação','Marketing'],['Eventos','Eventos'],
   ['Conexão e Associativismo','Conexão'],['Tenho interesse em mais de uma','Mais de uma']
  ].forEach(([val,lbl]) => {
    const b = document.createElement('button');
    b.className = 'ftab' + (val===filtroAtivo?' on':'');
    b.textContent = lbl;
    b.onclick = () => { filtroAtivo=val; document.querySelectorAll('.ftab').forEach(x=>x.classList.remove('on')); b.classList.add('on'); renderTabela(); };
    f.appendChild(b);
  });

  renderTabela();
}

function renderTabela() {
  const lista = filtroAtivo==='todas' ? todos : todos.filter(d=>d.comissao===filtroAtivo);
  const tb = document.getElementById('tbody');
  if (!lista.length) { tb.innerHTML='<tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--text-light)">Nenhuma inscrita.</td></tr>'; return; }
  const tagC = c => {
    if(c==='Marketing e Comunicação') return '<span class="tag t-mkt">📢 Marketing</span>';
    if(c==='Eventos') return '<span class="tag t-evt">🎯 Eventos</span>';
    if(c==='Conexão e Associativismo') return '<span class="tag t-con">🤝 Conexão</span>';
    return '<span class="tag t-mul">✨ Mais de uma</span>';
  };
  tb.innerHTML = lista.map((d,i) => `<tr>
    <td style="color:var(--text-light);font-size:11px">${i+1}</td>
    <td style="font-weight:600">${d.nome}</td>
    <td style="color:var(--text-med)">${d.empresa}</td>
    <td>${tagC(d.comissao)}</td>
    <td style="font-size:12px;color:var(--text-med)">${d.tempo}</td>
    <td style="font-size:12px;color:var(--text-med)">${d.perfil}</td>
    <td style="font-size:12px;color:var(--text-med)">${d.busca}</td>
    <td><a class="wpp" href="https://wa.me/55${String(d.whatsapp).replace(/\D/g,'')}" target="_blank">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.125.558 4.122 1.532 5.855L.057 23.885a.75.75 0 0 0 .93.927l6.107-1.557A11.945 11.945 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.804 9.804 0 0 1-4.988-1.366l-.358-.213-3.714.947.98-3.624-.233-.373A9.787 9.787 0 0 1 2.182 12C2.182 6.57 6.57 2.182 12 2.182c5.43 0 9.818 4.388 9.818 9.818 0 5.43-4.388 9.818-9.818 9.818z"/></svg>
      WhatsApp</a></td>
  </tr>`).join('');
}

function contar(dados, campo) {
  const c = {};
  dados.forEach(d => { const v = d[campo]||'N/A'; c[v]=(c[v]||0)+1; });
  return c;
}

function mkChart(id, tipo, labels, valores, cores, horizontal) {
  if (charts[id]) charts[id].destroy();
  const bg = labels.map((_,i) => cores[i%cores.length]);
  charts[id] = new Chart(document.getElementById(id).getContext('2d'), {
    type: tipo,
    data: { labels, datasets: [{ data: valores, backgroundColor: bg, borderWidth: tipo==='doughnut'?2:0, borderColor:'#fff', borderRadius: tipo==='bar'?6:0 }] },
    options: {
      indexAxis: horizontal?'y':'x',
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: tipo==='doughnut', position:'bottom', labels:{ font:{family:'Open Sans',size:11}, padding:10, boxWidth:12 } } },
      scales: tipo==='bar' ? {
        x: { grid:{display:!horizontal}, ticks:{font:{size:11}} },
        y: { grid:{display:horizontal,color:'rgba(0,0,0,0.05)'}, ticks:{font:{size:11},stepSize:1} }
      } : {}
    }
  });
}

init();
</script>
</body>
</html>
